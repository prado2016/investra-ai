name: Production Deployment

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows-archive-*/**'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  APP_DIR: '/opt/investra/app'
  DATA_DIR: '/opt/investra/data'
  LOGS_DIR: '/opt/investra/logs'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # CI: lint + type-check + build validation  (GitHub-hosted runner)
  # ─────────────────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build frontend (validation only)
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy: runs directly ON the VM via self-hosted runner
  # Builds frontend and compiles native modules for the VM's platform
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VM
    runs-on: self-hosted
    needs: ci
    environment: production

    env:
      DATABASE_URL: /opt/investra/data/investra.db
      PORT: 3001
      CLIENT_ORIGIN: http://10.0.0.61

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (compiles native modules for this host)
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Ensure data and logs directories exist
        run: |
          mkdir -p "${{ env.DATA_DIR }}" "${{ env.LOGS_DIR }}"

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start or reload Hono API via PM2
        env:
          NODE_ENV: production
          APP_DIR: ${{ github.workspace }}
        run: |
          # Stop existing process if running from a different directory
          pm2 delete investra 2>/dev/null || true

          # Start from the runner's work directory (avoids duplicating node_modules)
          pm2 start ecosystem.config.cjs --env production
          pm2 save
          pm2 list

      - name: Health check
        run: |
          echo "Waiting for server to be ready..."
          sleep 5

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3001/api/auth/get-session || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ]; then
              echo "Server is up (HTTP $STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 3s..."
            sleep 3
            if [ "$i" = "10" ]; then
              echo "Server failed to start"
              pm2 logs investra --lines 50
              exit 1
            fi
          done

  # ─────────────────────────────────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ci, deploy]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| CI Checks | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy to VM | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
